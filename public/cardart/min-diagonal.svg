<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 645" width="1024" height="645">
  <defs>
    <pattern id="diag" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <line x1="0" y1="0" x2="0" y2="32" stroke="white" stroke-width="1.8" opacity="0.28"/>
    </pattern>
    <pattern id="diag2" x="16" y="0" width="32" height="32" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <line x1="0" y1="0" x2="0" y2="32" stroke="white" stroke-width="0.6" opacity="0.15"/>
    </pattern>
    <linearGradient id="dfade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="black" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="black" stop-opacity="0"/>
      <stop offset="60%" stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <!-- Primary diagonal lines -->
  <rect width="1024" height="645" fill="url(#diag)"/>
  <!-- Secondary thinner lines between -->
  <rect width="1024" height="645" fill="url(#diag2)"/>
  <!-- Corner fades for depth -->
  <rect width="1024" height="645" fill="url(#dfade)"/>
</svg>
