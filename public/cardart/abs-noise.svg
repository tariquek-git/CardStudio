<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 645" width="1024" height="645">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="5" seed="42" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feComponentTransfer in="gray">
        <feFuncA type="linear" slope="0.22" intercept="0"/>
      </feComponentTransfer>
    </filter>
    <radialGradient id="nb1" cx="20%" cy="30%" r="45%">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nb2" cx="80%" cy="70%" r="40%">
      <stop offset="0%" stop-color="white" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nb3" cx="55%" cy="15%" r="35%">
      <stop offset="0%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nb4" cx="35%" cy="80%" r="30%">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nfade" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Noise texture -->
  <rect width="1024" height="645" filter="url(#noise)"/>
  <!-- Mesh gradient blobs -->
  <rect width="1024" height="645" fill="url(#nb1)"/>
  <rect width="1024" height="645" fill="url(#nb2)"/>
  <rect width="1024" height="645" fill="url(#nb3)"/>
  <rect width="1024" height="645" fill="url(#nb4)"/>
  <!-- Subtle diagonal fade -->
  <rect width="1024" height="645" fill="url(#nfade)"/>
</svg>
