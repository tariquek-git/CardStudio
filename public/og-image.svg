<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Card -->
  <g transform="translate(340, 140)">
    <rect x="0" y="0" width="520" height="327" rx="16" fill="url(#card)" opacity="0.95"/>
    <rect x="0" y="0" width="520" height="327" rx="16" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <!-- Chip -->
    <rect x="50" y="110" width="65" height="55" rx="8" fill="#D4A847"/>
    <!-- Text -->
    <text x="50" y="70" font-family="system-ui, sans-serif" font-size="22" font-weight="600" fill="rgba(255,255,255,0.9)">Maple Financial</text>
    <text x="420" y="55" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="rgba(255,255,255,0.8)" text-anchor="end">VISA</text>
    <text x="50" y="230" font-family="monospace" font-size="28" font-weight="500" fill="rgba(255,255,255,0.85)" letter-spacing="4">4242 4242 4242 4242</text>
    <text x="50" y="280" font-family="monospace" font-size="14" fill="rgba(255,255,255,0.7)">JANE A. CARDHOLDER</text>
    <text x="420" y="280" font-family="monospace" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="end">12/28</text>
  </g>
  <!-- Title -->
  <text x="600" y="540" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="white" text-anchor="middle">Fintech Commons Card Studio</text>
  <text x="600" y="575" font-family="system-ui, sans-serif" font-size="16" fill="rgba(255,255,255,0.6)" text-anchor="middle">Design payment cards in 3D with live wallet mockups</text>
</svg>
