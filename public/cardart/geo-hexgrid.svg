<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 645" width="1024" height="645">
  <defs>
    <pattern id="hex" x="0" y="0" width="60" height="52" patternUnits="userSpaceOnUse">
      <polygon points="30,2 56,15 56,37 30,50 4,37 4,15" fill="none" stroke="white" stroke-width="0.8" opacity="0.38"/>
    </pattern>
    <pattern id="hex2" x="30" y="26" width="60" height="52" patternUnits="userSpaceOnUse">
      <polygon points="30,2 56,15 56,37 30,50 4,37 4,15" fill="none" stroke="white" stroke-width="0.8" opacity="0.38"/>
    </pattern>
    <linearGradient id="hfade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="black" stop-opacity="0"/>
      <stop offset="50%" stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="hglow" cx="30%" cy="40%" r="55%">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Base hex grid -->
  <rect width="1024" height="645" fill="url(#hex)"/>
  <rect width="1024" height="645" fill="url(#hex2)"/>
  <!-- Gradient fade for depth -->
  <rect width="1024" height="645" fill="url(#hfade)"/>
  <!-- Soft glow highlight -->
  <rect width="1024" height="645" fill="url(#hglow)"/>
  <!-- Accent filled hexagons -->
  <g fill="white">
    <polygon points="330,184 356,197 356,219 330,232 304,219 304,197" opacity="0.12"/>
    <polygon points="690,340 716,353 716,375 690,388 664,375 664,353" opacity="0.1"/>
    <polygon points="510,80 536,93 536,115 510,128 484,115 484,93" opacity="0.08"/>
    <polygon points="180,440 206,453 206,475 180,488 154,475 154,453" opacity="0.08"/>
    <polygon points="810,130 836,143 836,165 810,178 784,165 784,143" opacity="0.06"/>
  </g>
</svg>
