<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 645" width="1024" height="645">
  <defs>
    <pattern id="ch" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="16" stroke="white" stroke-width="0.6" opacity="0.32"/>
    </pattern>
    <pattern id="ch2" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
      <line x1="0" y1="0" x2="0" y2="16" stroke="white" stroke-width="0.6" opacity="0.32"/>
    </pattern>
    <radialGradient id="chglow" cx="45%" cy="45%" r="55%">
      <stop offset="0%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chfade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="black" stop-opacity="0.35"/>
      <stop offset="35%" stop-color="black" stop-opacity="0"/>
      <stop offset="65%" stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.35"/>
    </linearGradient>
  </defs>
  <!-- Crosshatch pattern -->
  <rect width="1024" height="645" fill="url(#ch)"/>
  <rect width="1024" height="645" fill="url(#ch2)"/>
  <!-- Depth effects -->
  <rect width="1024" height="645" fill="url(#chglow)"/>
  <rect width="1024" height="645" fill="url(#chfade)"/>
</svg>
